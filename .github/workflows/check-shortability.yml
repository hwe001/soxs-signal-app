name: Check Alpaca Shortability

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    env:
      SQQQ_ALPACA_API_KEY_ID: ${{ secrets.SQQQ_ALPACA_API_KEY_ID }}
      SQQQ_ALPACA_API_SECRET_KEY: ${{ secrets.SQQQ_ALPACA_API_SECRET_KEY }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check SOXS and SQQQ shortability
        run: python check_alpaca_shortability.py
