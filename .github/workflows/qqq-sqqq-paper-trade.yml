name: Run QQQ SOXS Core Paper Bot

on:
  schedule:
    # Near 3:45-3:59 PM New York during daylight saving time.
    # GitHub scheduled runs can start late, so use a few near-close attempts.
    - cron: "45,50,55 19 * * 1-5"
    # Near 3:45-3:59 PM New York during standard time.
    - cron: "45,50,55 20 * * 1-5"
  workflow_dispatch:
    inputs:
      submit_paper_orders:
        description: "Submit Alpaca paper orders?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      bypass_345pm_gate:
        description: "Bypass 3:45 PM New York time gate for manual test?"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  rebalance:
    runs-on: ubuntu-latest

    env:
      SQQQ_ALPACA_API_KEY_ID: ${{ secrets.SQQQ_ALPACA_API_KEY_ID }}
      SQQQ_ALPACA_API_SECRET_KEY: ${{ secrets.SQQQ_ALPACA_API_SECRET_KEY }}
      SOXS_CORE_ALPACA_API_KEY_ID: ${{ secrets.SOXS_CORE_ALPACA_API_KEY_ID }}
      SOXS_CORE_ALPACA_API_SECRET_KEY: ${{ secrets.SOXS_CORE_ALPACA_API_SECRET_KEY }}
      SQQQ_EXECUTE_ORDERS: ${{ secrets.SQQQ_EXECUTE_ORDERS }}
      SOXS_CORE_EXECUTE_ORDERS: ${{ secrets.SOXS_CORE_EXECUTE_ORDERS }}

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run QQQ/SOXS paper bot
        shell: bash
        run: |
          args=()

          submit="${{ github.event.inputs.submit_paper_orders }}"
          if [[ "$submit" == "true" || "$SOXS_CORE_EXECUTE_ORDERS" == "true" || "$SQQQ_EXECUTE_ORDERS" == "true" ]]; then
            args+=(--execute --cancel-open-orders)
          fi

          bypass="${{ github.event.inputs.bypass_345pm_gate }}"
          if [[ "$bypass" == "true" ]]; then
            args+=(--force-run)
          fi

          python qqq_sqqq_paper_trade_runner.py "${args[@]}"
